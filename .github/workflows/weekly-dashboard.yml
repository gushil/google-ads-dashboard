name: Weekly Paid Media Dashboard

# Runs every Monday at 13:00 UTC (08:00 ET). Adjust the cron as needed.
# Also runnable on-demand from the Actions tab via workflow_dispatch.
on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly pipeline
        env:
          GADS_DEVELOPER_TOKEN: ${{ secrets.GADS_DEVELOPER_TOKEN }}
          GADS_CLIENT_ID: ${{ secrets.GADS_CLIENT_ID }}
          GADS_CLIENT_SECRET: ${{ secrets.GADS_CLIENT_SECRET }}
          GADS_REFRESH_TOKEN: ${{ secrets.GADS_REFRESH_TOKEN }}
          GADS_LOGIN_CUSTOMER_ID: ${{ secrets.GADS_LOGIN_CUSTOMER_ID }}
          GADS_CUSTOMER_ID: ${{ secrets.GADS_CUSTOMER_ID }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-sonnet-4-6' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ vars.MAIL_FROM }}
          MAIL_TO: ${{ vars.MAIL_TO }}
          TARGET_CPA_USD: ${{ vars.TARGET_CPA_USD || '150' }}
          CURRENCY: ${{ vars.CURRENCY || 'USD' }}
        run: python run_weekly.py

      # Keep a downloadable copy of each week's HTML on the run for audit/history.
      - name: Upload dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paid-media-weekly-${{ github.run_number }}
          path: output/*.html
          retention-days: 90
